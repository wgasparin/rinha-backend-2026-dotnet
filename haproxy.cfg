# Lean HAProxy for Rinha: round-robin over 2 AOT API replicas, no logs in
# the hot path, aggressive timeouts. Single-threaded because the cgroup is
# capped at 0.10 CPU — multiple threads would only contend.

global
    maxconn 512
    nbthread 1

defaults
    mode http
    no log
    option dontlognull
    option http-keep-alive
    timeout connect 500ms
    timeout client 5s
    timeout server 5s
    timeout http-request 2s
    timeout http-keep-alive 10s

# Use Docker's embedded DNS so server names re-resolve if a container is
# restarted (e.g., `restart: unless-stopped` brings api-1 back on a new IP).
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend public
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    option http-keep-alive
    option prefer-last-server
    # Only route to backends whose /ready returns 200.
    # If both fail, HAProxy returns 503 — exactly what the HLD requires
    # (no synthetic 200 when the data layer is broken).
    option httpchk GET /ready
    http-check expect status 200
    default-server check inter 1s fall 3 rise 2 maxconn 256 resolvers docker init-addr libc,last,none
    server api-1 api-1:8080
    server api-2 api-2:8080
